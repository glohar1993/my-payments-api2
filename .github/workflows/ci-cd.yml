name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  SERVICE_NAME: my-payments-api2

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test:unit -- --ci --coverage
      - run: npm run test:infra -- --ci

  build:
    name: Build & Synth
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run cdk:synth
      - name: CDK Diff
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          ENV: staging
        run: npm run cdk:diff
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: cdk-output
          path: cdk.out/

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: npm ci
      - run: npm run build
      - name: Clean up orphaned log groups
        run: aws logs delete-log-group --log-group-name "/api/$SERVICE_NAME/staging/access" --region us-east-1 2>/dev/null || true
        continue-on-error: true
      - run: ENV=staging npx cdk deploy --require-approval never

  e2e-staging:
    name: E2E Tests (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Get Staging API URL
        id: get-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$SERVICE_NAME-staging" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      - name: Run E2E Tests
        env:
          API_URL: ${{ steps.get-url.outputs.api_url }}
        run: |
          set +e
          bash e2e-tests/run-e2e.sh
          EXIT_CODE=$?
          set -e
          exit $EXIT_CODE

  deploy-production:
    name: Deploy to Production
    needs: e2e-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: npm ci
      - run: npm run build
      - name: Clean up orphaned resources
        run: |
          aws logs delete-log-group --log-group-name "/api/$SERVICE_NAME/production/access" --region us-east-1 2>/dev/null || true
          COUNT=$(aws dynamodb describe-table --table-name "$SERVICE_NAME-production-table" --region us-east-1 --query "Table.ItemCount" --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$COUNT" = "0" ]; then
            aws dynamodb delete-table --table-name "$SERVICE_NAME-production-table" --region us-east-1 2>/dev/null || true
            aws dynamodb wait table-not-exists --table-name "$SERVICE_NAME-production-table" --region us-east-1 2>/dev/null || true
          fi
        continue-on-error: true
      - run: ENV=production npx cdk deploy --require-approval never
      - name: Production Smoke Test
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$SERVICE_NAME-production" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}health")
          [ "$HTTP" = "200" ] && echo "Production is healthy!" || exit 1
